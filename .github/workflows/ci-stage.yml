name: "CI/CD — Backend Lambdas [STAGE]"

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      deploy:
        description: "¿Deployar a AWS STAGE? (true = deploy, false = solo build/test)"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  id-token: write
  contents: read

env:
  GO_VERSION: "1.23"
  AWS_REGION: us-east-1
  ENVIRONMENT: stage
  STACK_NAME: demo-ticketing-backend-stage

jobs:
  build-and-test:
    name: "Build & Test (Go)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/*.sum"

      - name: Run Tests
        run: |
          for lambda_dir in lambdas/*/; do
            echo "▶ Testing $lambda_dir"
            cd "$lambda_dir"
            go test ./... -v -race -timeout 60s || exit 1
            cd ../..
          done

      - name: SAM Build
        uses: aws-actions/setup-sam@v2
        
      - run: sam build --parallel

  deploy:
    name: "Deploy → AWS STAGE"
    needs: build-and-test
    runs-on: ubuntu-latest
    # Solo corre si el input deploy=true (manual dispatch) o si se hizo push en develop + input no existe
    if: ${{ github.event.inputs.deploy == 'true' }}
    environment: stage
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/*.sum"

      - name: Configure AWS Credentials (OIDC → operations-stage)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: SAM Build
        run: sam build --parallel

      - name: SAM Deploy → STAGE
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name ${{ env.STACK_NAME }} \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --region ${{ env.AWS_REGION }} \
            --parameter-overrides \
              Environment=${{ env.ENVIRONMENT }} \
              TfStateAccount=${{ secrets.OPERATIONS_STAGE_ACCOUNT_ID }}

      - name: Summary
        run: |
          echo "✅ Deploy completado a STAGE"
          echo "Stack: ${{ env.STACK_NAME }}"
          echo "Región: ${{ env.AWS_REGION }}"
