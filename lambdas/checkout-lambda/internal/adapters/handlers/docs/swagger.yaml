    post:
      consumes:
      - application/json
      description: Validates payload and triggers async queue for payment
      parameters:
      - description: Checkout Request object
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.CheckoutRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/domain.CheckoutResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Process a checkout
      tags:
      - checkout
swagger: "2.0"
