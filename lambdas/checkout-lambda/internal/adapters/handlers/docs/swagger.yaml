basePath: /
definitions:
  domain.CheckoutRequest:
    properties:
      event_id:
        type: string
      method:
        type: string
      seats:
        items:
          type: string
        type: array
    type: object
  domain.CheckoutResponse:
    properties:
      message:
        type: string
      order_id:
        type: string
      status:
        type: string
    type: object
host: localhost:3004
info:
  contact: {}
  description: Ticketera Cloud Checkout Microservice API
  title: Checkout API
  version: "1.0"
paths:
