AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Ticketera Cloud - Tickets Service

Parameters:
  CognitoUserPoolArn:
    Type: String
    Default: "arn:aws:cognito-idp:us-east-1:000000000000:userpool/local_UserPool"
    Description: ARN del Cognito User Pool para validacion JWT

Globals:
  Function:
    Timeout: 5
    MemorySize: 128
    Runtime: provided.al2023
    Architectures:
      - arm64

Resources:
  TicketsApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: dev
      Auth:
        ApiKeyRequired: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Ref CognitoUserPoolArn
            Identity:
              Header: Authorization
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"

  TicketsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: .
      Handler: bootstrap
      Environment:
        Variables:
          TICKETS_TABLE_NAME: !Ref TicketsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TicketsTable
      Events:
        GetMyTickets:
          Type: Api
          Properties:
            RestApiId: !Ref TicketsApi
            Path: /tickets/me
            Method: GET
            Auth:
              ApiKeyRequired: true
              Authorizer: CognitoAuthorizer   # API Key + JWT: datos personales del usuario
        CreateTicket:
          Type: Api
          Properties:
            RestApiId: !Ref TicketsApi
            Path: /tickets
            Method: POST
            Auth:
              ApiKeyRequired: true
              Authorizer: CognitoAuthorizer   # API Key + JWT: solo la SAGA autenticada crea tickets
        GetSwagger:
          Type: Api
          Properties:
            RestApiId: !Ref TicketsApi
            Path: /swagger.json
            Method: GET
            Auth:
              ApiKeyRequired: false


  TicketsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: ticket_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
        - AttributeName: ticket_id
          KeyType: RANGE

