AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Ticketera Cloud - Seats Service

Globals:
  Function:
    Timeout: 5
    MemorySize: 128
    Runtime: provided.al2023
    Architectures:
      - arm64

Resources:
  SeatsApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: dev
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
        
  SeatsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: .
      Handler: bootstrap
      Environment:
        Variables:
          SEATS_TABLE_NAME: !Ref EventSeatsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventSeatsTable
      Events:
        GetSeatsByEventId:
          Type: Api
          Properties:
            RestApiId: !Ref SeatsApi
            Path: /events/{eventId}/seats
            Method: GET
        ReserveSeat:
          Type: Api
          Properties:
            RestApiId: !Ref SeatsApi
            Path: /events/{eventId}/seats/{seatId}/reserve
            Method: POST
        ReleaseSeat:
          Type: Api
          Properties:
            RestApiId: !Ref SeatsApi
            Path: /events/{eventId}/seats/{seatId}/release
            Method: POST
        GetSwagger:
          Type: Api
          Properties:
            RestApiId: !Ref SeatsApi
            Path: /swagger.json
            Method: GET

  EventSeatsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: event_id
          AttributeType: S
        - AttributeName: seat_id
          AttributeType: S
      KeySchema:
        - AttributeName: event_id
          KeyType: HASH
        - AttributeName: seat_id
          KeyType: RANGE
